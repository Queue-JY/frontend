<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attack on Titan World Map</title>
  <link rel="stylesheet" href="assets/css/index.css">
  <link rel="stylesheet" href="assets/css/common.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
  <h1 class="page-title">Attack on Titan World Map</h1>
  <div class="giant-world-map" onclick="window.location.href='pages/sea.html';">
    <div class="sea-title">Sea</div>
    <div class="marley" onclick="window.location.href='pages/marley.html'; event.stopPropagation();">
      <div class="marley-title">Marley</div>
    </div>
    <div class="paradis" onclick="event.stopPropagation();">
      <div class="wall maria" onclick="window.location.href='pages/maria.html';"><span>Wall Maria</span></div>
      <div class="wall rose" onclick="window.location.href='pages/rose.html';"><span>Wall Rose</span></div>
      <div class="wall sina" onclick="window.location.href='pages/sina.html';"><span>Wall Sina</span></div>
    </div>
    <div class="click_box" onclick="event.stopPropagation();">
      <div class="설명"></div>
      <h3>글씨를 클릭해보세요.</h3>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-visitors">
        <i class="fas fa-eye"></i> <span id="visit-count">...</span>
      </span>
      <span class="footer-copy">
        © 2025 <strong>Juicy</strong>. All rights reserved.
      </span>
      <span class="footer-made">
        Made with <i class="fas fa-heart"></i> by Juicy
      </span>
    </div>
  </footer>

  <script>
    fetch("https://api.counterapi.dev/v1/aot-worldmap-juicy/visitors/up")
      .then(res => res.json())
      .then(data => {
        document.getElementById("visit-count").textContent = Number(data.count).toLocaleString() + "명 방문";
      })
      .catch(() => {
        document.getElementById("visit-count").textContent = "-";
      });
  </script>
</body>
</html>
